<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fitness Log Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>健身饮食记录</h1>
    <p class="intro">记录每日身体数据和营养摄入，数据会保存在本地浏览器中。</p>

    <section class="card">
      <h2>新增记录</h2>
      <form id="record-form" novalidate>
        <div class="form-grid">
          <label>
            日期
            <input id="date" name="date" type="date" required>
          </label>

          <label>
            体重 (kg)
            <input id="weight" name="weight" type="number" step="0.1" min="0" required>
          </label>

          <label>
            腰围 (cm)
            <input id="waist" name="waist" type="number" step="0.1" min="0" required>
          </label>

          <label>
            热量 (kcal)
            <input id="calories" name="calories" type="number" step="1" min="0" required>
          </label>

          <label>
            蛋白质 (g)
            <input id="protein" name="protein" type="number" step="0.1" min="0" required>
          </label>
        </div>

        <button type="submit" class="primary-btn">保存记录</button>
        <p id="message" class="message" aria-live="polite"></p>
      </form>
    </section>

    <section class="card">
      <h2>历史记录</h2>
      <p id="average-summary" class="average-summary">平均值：暂无数据</p>
      <ul id="record-list" class="record-list"></ul>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
